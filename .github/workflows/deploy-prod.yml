name: Prod Deployment

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/auth-server:prod
        build-args: |
          SPRING_PROFILES_ACTIVE=prod

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Prod via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker network create aws-prod-network || true
            docker pull qarani/auth-server:prod
            docker stop auth-server-prod || true
            docker rm auth-server-prod || true
            docker run -d --name auth-server-prod \
              --network aws-prod-network \
              -p 8081:8081 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e AUTH_SERVICE_PORT=8081 \
              -e PROD_FRONTEND_URL=http://frontend:5173 \
              -e PROD_JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 \
              -e JWT_SECRET_EXPIRATION=86400000 \
              -e PROD_NATS_USERNAME=nats-prod-user \
              -e PROD_NATS_URL=nats-prod:4222 \
              -e PROD_NATS_PASSWORD=nats-prod-password \
              -e PROD_DATASOURCE_PASSWORD=postgres-prod-password \
              -e PROD_DATASOURCE_USERNAME=postgres-prod-user \
              -e PROD_DATASOURCE_URL=jdbc:postgresql://postgres-prod:5432/auth_db \
              -e PROD_MAIL_HOST=smtp.gmail.com \
              -e PROD_MAIL_PORT=587 \
              -e PROD_MAIL_USERNAME=emqarani@gmail.com \
              -e PROD_MAIL_PASSWORD="cbhs oyci khfa psij" \
              -e EUREKA_SERVER_URL=http://discovery-server-prod:8761/eureka/ \
              -e DEV_EMAIL_VERIFICATION_ENABLED=false \
              qarani/auth-server:prod