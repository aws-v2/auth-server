name: Prod deployment.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  pull-requests: write

jobs:
  prod-test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run prod tests
        run: mvn clean

  prod-build-and-push:
    runs-on: ubuntu-latest
    needs: prod-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/auth-server:prod
          build-args: |
            SPRING_PROFILES_ACTIVE=prod

  deploy:
    if: github.event_name == 'push'
    needs: prod-build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Prod via SSH over Tailscale.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USERNAME }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            docker network create aws-prod-network || true
            echo "Pulling latest image......"

            docker pull qarani/auth-server:prod
            docker stop auth-server-prod || true
            echo "Removing old service....."

            docker service rm auth-server-prod || true
            echo "Deploying new service....."
            docker service create \
              --name auth-server-prod \
              --network aws-prod-network \
              --publish published=8081,target=8081 \
              --env SPRING_PROFILES_ACTIVE=prod \
              --env SERVER_PORT=8081 \
              --env PROD_FRONTEND_URL=http://frontend:5173 \
              --env PROD_JWT_SECRET=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970 \
              --env PROD_JWT_EXPIRATION=86400000 \
              --env PROD_NATS_USERNAME=nats-prod-user \
              --env PROD_NATS_URL=nats-prod:4222 \
              --env PROD_NATS_PASSWORD=nats-prod-password \
              --env PROD_DATASOURCE_PASSWORD=postgres-prod-password \
              --env PROD_DATASOURCE_USERNAME=postgres-prod-user \
              --env PROD_DATASOURCE_URL=jdbc:postgresql://postgres-prod:5432/auth_db \
              --env PROD_MAIL_HOST=smtp.gmail.com \
              --env PROD_MAIL_PORT=587 \
              --env PROD_MAIL_USERNAME=emqarani@gmail.com \
              --env PROD_MAIL_PASSWORD="cbhs oyci khfa psij" \
              --env EUREKA_SERVER_URL=http://discovery-server-prod:8761/eureka/ \
              --env DEV_EMAIL_VERIFICATION_ENABLED=false \
              qarani/auth-server:prod