      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: "true"
    show-sql: "true"
    hibernate:
      ddl-auto: update
    flyway:
      baseline-on-migrate: true
      baseline-version: 0

