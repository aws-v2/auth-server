spring:
  application:
    name: auth-service

  # Profile configuration
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jpa:
    open-in-view: false

  # Graceful shutdown configuration
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${AUTH_SERVICE_PORT:8081}
  # Graceful shutdown
  shutdown: graceful
  # Compression
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

# Scheduled tasks
scheduled:
  token-cleanup:
    cron: "0 0 * * * *" # Every hour

# Add actuator endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
