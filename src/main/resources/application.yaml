spring:
  application-name: auth-service
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: 'true'
    show-sql: 'true'
    hibernate:
      ddl-auto: update
    open-in-view: false  # Disable to remove the warning
    flyway:
      baseline-on-migrate: true
      baseline-version: 0

  datasource:
    password: ${DEV_DATASOURCE_PASSWORD:npg_FUvQyuo8M9Kc}
    driver-class-name: org.postgresql.Driver
    username: ${DEV_DATASOURCE_USERNAME:neondb_owner}
    # url: ${DEV_DATASOURCE_URL:jdbc:postgresql://localhost:5432}/auth_db_dev
    url: jdbc:postgresql://ep-sparkling-dust-a4zga52i-pooler.us-east-1.aws.neon.tech/serwin-auth-db?sslmode=require&channel_binding=require












  mail:
    host: ${DEV_MAIL_HOST:smtp.gmail.com}
    port: ${DEV_MAIL_PORT:587}
    username: ${DEV_MAIL_USERNAME:}
    password: ${DEV_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Graceful shutdown configuration
  lifecycle:
    timeout-per-shutdown-phase: 30s

logging:
  level:
    root: INFO
    org:
      serwin:
        auth_server: DEBUG
      springframework:
        security: DEBUG
        cloud:
          netflix:
            eureka: DEBUG
        web: DEBUG
    com:
      netflix:
        discovery: DEBUG
    # Audit logger
    AUDIT: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %highlight(%-5level) %cyan(%logger{36}) - %msg%n"
  file:
    name: logs/auth-server-dev.log
    max-size: 10MB
    max-history: 7

jwt:
  secret: ${DEV_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_SECRET_EXPIRATION:86400000}

server:
  port: ${AUTH_SERVICE_PORT:8081}
  # Graceful shutdown
  shutdown: graceful
  # Compression
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

app:
  frontend:
    url: ${DEV_FRONTEND_URL:http://localhost:5173}

eureka:
  instance:
    hostname: localhost
    instance-id: ${spring.application.name}:${server.port}
    prefer-ip-address: true
    ip-address: 127.0.0.1
    status-page-url: ${DEV_EUREKA_SCHEME:http}://${DEV_EUREKA_HOSTNAME:localhost}:${server.port}/actuator/info
    health-check-url: ${DEV_EUREKA_SCHEME:http}://${DEV_EUREKA_HOSTNAME:localhost}:${server.port}/actuator/health
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 40
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${DEV_EUREKA_SCHEME:http}://${DEV_EUREKA_HOSTNAME:localhost}:8761/eureka/
    register-with-eureka: ${EUREKA_ENABLED:true}
    fetch-registry: ${EUREKA_ENABLED:true}
    registry-fetch-interval-seconds: 30
    initial-instance-info-replication-interval-seconds: 10
    eureka-service-url-poll-interval-seconds: 30

# NATS Configuration
nats:
  url: ${DEV_NATS_URL:nats://localhost:4222}
  username: ${DEV_NATS_USERNAME:auth-server}
  password: ${DEV_NATS_PASSWORD:auth-secret}

# Scheduled tasks
scheduled:
  token-cleanup:
    cron: "0 0 * * * *"  # Every hour

# Add actuator endpoints for health checks
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always