# SSL/TLS Configuration for Production
# This configuration should be used when deploying behind a load balancer with SSL termination
# or when running with a valid SSL certificate

server:
  ssl:
    enabled: ${SSL_ENABLED:false}
    key-store: ${SSL_KEYSTORE_PATH:classpath:keystore.p12}
    key-store-password: ${SSL_KEYSTORE_PASSWORD:changeit}
    key-store-type: ${SSL_KEYSTORE_TYPE:PKCS12}
    key-alias: ${SSL_KEY_ALIAS:auth-server}
    enabled-protocols: TLSv1.2,TLSv1.3
  http2:
    enabled: true

spring:
  application:
    name: auth-service
  security:
    filter:
      dispatcher-types: REQUEST, ERROR, ASYNC, FORWARD
