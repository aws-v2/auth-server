spring:
  application:
    name: auth-service
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: "false"
    show-sql: "false"
    hibernate:
      ddl-auto: validate
    open-in-view: false
    flyway:
      baseline-on-migrate: true
      baseline-version: 0

  datasource:
    password: ${STAGING_DATASOURCE_PASSWORD:auth-password}
    driver-class-name: org.postgresql.Driver
    username: ${STAGING_DATASOURCE_USERNAME:auth-user}
    url: ${STAGING_DATASOURCE_URL:jdbc:postgresql://auth-postgres:5432/authdb}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  mail:
    host: ${STAGING_MAIL_HOST:smtp.gmail.com}
    port: ${STAGING_MAIL_PORT:587}
    username: ${STAGING_MAIL_USERNAME}
    password: ${STAGING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  lifecycle:
    timeout-per-shutdown-phase: 30s

logging:
  level:
    root: INFO
    org:
      serwin:
        auth_server: INFO
      springframework:
        security: WARN
        web: WARN
    AUDIT: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/auth-server-staging.log
    max-size: 50MB
    max-history: 30

jwt:
  secret: ${STAGING_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_SECRET_EXPIRATION:86400000}

server:
  port: ${AUTH_SERVICE_PORT:8081}
  shutdown: graceful
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain

app:
  frontend:
    url: ${STAGING_FRONTEND_URL:http://frontend:5173}

# NATS Configuration
nats:
  url: nats://nats:4222
  username: ${STAGING_NATS_USERNAME:auth-server}
  password: ${STAGING_NATS_PASSWORD:auth-secret}

# Scheduled tasks
scheduled:
  token-cleanup:
    cron: "0 0 * * * *" # Every hour

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
    lease-renewal-interval-in-seconds: 30
    lease-expiration-duration-in-seconds: 90
