version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: auth-postgres
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - auth-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d auth_db_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # NATS Message Broker
  nats:
    image: nats:2.10-alpine
    container_name: auth-nats
    command:
      - "--user"
      - "auth-server"
      - "--pass"
      - "auth-secret"
      - "--jetstream"
      - "--store_dir"
      - "/data"
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    networks:
      - auth-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Eureka Discovery Server (Optional - if you have one)
#  eureka:
#    image: springcloud/eureka:latest
#    container_name: auth-eureka
#    environment:
#      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
#      - EUREKA_CLIENT_FETCH_REGISTRY=false
#    ports:
#      - "8761:8761"
#    networks:
#      - auth-network
#    healthcheck:
#      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
#      interval: 30s
#      timeout: 10s
#      retries: 5
#    restart: unless-stopped

  # Auth Server Application
  auth-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auth-server
    environment:
      # Spring Profile
      SPRING_PROFILES_ACTIVE: dev

      # Database
      DEV_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db_dev
      DEV_DATASOURCE_USERNAME: root
      DEV_DATASOURCE_PASSWORD: root

      # NATS
      DEV_NATS_URL: nats://nats:4222
      DEV_NATS_USERNAME: auth-server
      DEV_NATS_PASSWORD: auth-secret

      # Eureka
      DEV_EUREKA_SCHEME: http
      DEV_EUREKA_HOSTNAME: eureka

      # JWT
      DEV_JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_SECRET_EXPIRATION: 86400000

      # Mail (Update with your credentials)
      DEV_MAIL_HOST: smtp.gmail.com
      DEV_MAIL_PORT: 587
      DEV_MAIL_USERNAME: ${MAIL_USERNAME:-your-email@gmail.com}
      DEV_MAIL_PASSWORD: ${MAIL_PASSWORD:-your-app-password}

      # Frontend URL
      DEV_FRONTEND_URL: http://localhost:5173

      # Server Port
      AUTH_SERVICE_PORT: 8081

      # JVM Options
      JAVA_OPTS: "-Xms512m -Xmx1024m -XX:+UseG1GC"
    ports:
      - "8081:8081"
    volumes:
      - ./logs:/app/logs
    networks:
      - auth-network
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
#      eureka:
#        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # Redis for Rate Limiting
  redis:
    image: redis:7-alpine
    container_name: auth-redis
    command: redis-server --requirepass redis-password
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - auth-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  auth-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  nats-data:
    driver: local
  redis-data:
    driver: local
